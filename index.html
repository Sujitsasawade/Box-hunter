<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Box Hunter</title>

    <meta name="description"
        content="Box Hunter - A fast paced box clicking game built using HTML CSS and JavaScript.">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🎯 Box Hunter</h1>

        <p class="subtitle">
            Click the moving boxes and score as high as you can!
        </p>


        <div class="menu">

            <label>
                Difficulty:
            </label>

            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>


            <label>
                Time:
            </label>

            <select id="timeMode">
                <option value="30">30 Seconds</option>
                <option value="60">60 Seconds</option>
            </select>


            <button id="startBtn">
                Start Game
            </button>

        </div>


        <div class="game-info">

            <div>
                Score:
                <span id="score">
                    0
                </span>
            </div>


            <div>
                Time:
                <span id="timer">
                    30
                </span>
            </div>

        </div>


        <div id="gameArea">

            <div class="box">
            </div>

        </div>


        <h2 id="gameOver">
            
        </h2>


    </div>


<script src="script.js"></script>

</body>
</html>
